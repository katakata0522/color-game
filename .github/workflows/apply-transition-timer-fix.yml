name: Apply transition timer fix

on:
  push:
    branches:
      - fix/audit-followup-transition-timers

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/audit-followup-transition-timers
          fetch-depth: 0

      - name: Patch and validate
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('script.js')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  "        this.timerInterval = null;\n        this.timeLeft = 0;",
                  "        this.timerInterval = null;\n        this.transitionTimeout = null;\n        this.timeLeft = 0;"
              ),
              (
                  "    startGame() {\n        if (this.gameActive) return;",
                  "    clearTransitionTimeout() {\n        if (this.transitionTimeout) {\n            clearTimeout(this.transitionTimeout);\n            this.transitionTimeout = null;\n        }\n    }\n\n    scheduleTransition(callback, delay) {\n        this.clearTransitionTimeout();\n        this.transitionTimeout = setTimeout(() => {\n            this.transitionTimeout = null;\n            if (!this.gameActive) return;\n            callback();\n        }, delay);\n    }\n\n    startGame() {\n        if (this.gameActive) return;\n        this.clearTransitionTimeout();"
              ),
              (
                  "    resetGame() {\n        this.stopTimer();",
                  "    resetGame() {\n        this.clearTransitionTimeout();\n        this.stopTimer();"
              ),
              (
                  "    setupQuestion() {\n        if (this.lives <= 0)",
                  "    setupQuestion() {\n        if (!this.gameActive) return;\n        if (this.lives <= 0)"
              ),
              (
                  "            setTimeout(() => this.setupQuestion(), GAME_SETTINGS.RESULT_DISPLAY_DELAY);",
                  "            this.scheduleTransition(() => this.setupQuestion(), GAME_SETTINGS.RESULT_DISPLAY_DELAY);"
              ),
              (
                  "            setTimeout(() => this.endGame('over'), GAME_SETTINGS.RESULT_DISPLAY_DELAY);",
                  "            this.scheduleTransition(() => this.endGame('over'), GAME_SETTINGS.RESULT_DISPLAY_DELAY);"
              ),
              (
                  "            setTimeout(() => this.setupQuestion(), GAME_SETTINGS.RESULT_DISPLAY_DELAY * 0.8);",
                  "            this.scheduleTransition(() => this.setupQuestion(), GAME_SETTINGS.RESULT_DISPLAY_DELAY * 0.8);"
              ),
              (
                  "    handleTimeOut() {\n        this.sound.playTimeout();",
                  "    handleTimeOut() {\n        if (!this.gameActive) return;\n        this.sound.playTimeout();"
              ),
              (
                  "    endGame(type) {\n        this.gameActive = false;",
                  "    endGame(type) {\n        if (!this.gameActive) return;\n        this.clearTransitionTimeout();\n        this.gameActive = false;"
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one match, found {count}: {old[:80]!r}')
              text = text.replace(old, new, 1)

          if text.count('setTimeout(() => this.setupQuestion()') != 1:
              # One occurrence remains inside scheduleTransition's implementation context only if formatting changes;
              # direct game transitions must all use scheduleTransition.
              direct = [line for line in text.splitlines() if 'setTimeout(() => this.setupQuestion()' in line]
              if direct:
                  raise SystemExit(f'Unexpected direct setupQuestion timeout remains: {direct}')

          path.write_text(text, encoding='utf-8')
          PY

          node --check script.js
          grep -q "scheduleTransition(() => this.setupQuestion()" script.js
          grep -q "scheduleTransition(() => this.endGame('over')" script.js

      - name: Commit fixes and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-transition-timer-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add script.js .github/workflows/apply-transition-timer-fix.yml
          git commit -m "fix: リセット後の遅延処理競合を防止"
          git push origin HEAD:fix/audit-followup-transition-timers
