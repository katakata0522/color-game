name: Temporary comprehensive audit
on:
  push:
    branches: [audit/comprehensive-review-20260717-v2]
permissions:
  contents: write
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/comprehensive-review-20260717-v2
          fetch-depth: 0
      - name: Scan tracked files
        shell: bash
        run: |
          python3 - <<'PY'
          import ast, collections, hashlib, html.parser, json, re, subprocess
          from pathlib import Path
          from urllib.parse import unquote, urlsplit
          root=Path('.').resolve(); out=root/'audit'; out.mkdir(exist_ok=True)
          skip={'.github/workflows/temp-comprehensive-audit.yml','audit/AUDIT_REPORT.md','audit/AUDIT_FILES.tsv','audit/AUDIT_FINDINGS.json'}
          paths=[Path(x.decode('utf-8','surrogateescape')) for x in subprocess.check_output(['git','ls-files','-z']).split(b'\0') if x]
          paths=[p for p in paths if p.as_posix() not in skip and (root/p).is_file()]
          findings=[]; inventory=[]; syntax=[]; texts={}; hashes=collections.defaultdict(list)
          def add(sev,cat,p,line,msg): findings.append({'severity':sev,'category':cat,'path':p.as_posix() if isinstance(p,Path) else str(p),'line':line or 0,'message':msg})
          def text(p):
            if p not in texts:
              b=(root/p).read_bytes(); texts[p]=None if b'\0' in b else b.decode('utf-8','replace')
            return texts[p]
          for p in paths:
            f=root/p; t=text(p); size=f.stat().st_size; lines=(t.count('\n')+1) if t is not None else 0
            inventory.append((p.as_posix(),size,lines,p.suffix.lower() or '[none]'))
            if 0<size<=5*1024*1024: hashes[hashlib.sha256(f.read_bytes()).hexdigest()].append(p.as_posix())
            if p.suffix.lower()=='.js' and size<2*1024*1024 and not p.name.endswith('.min.js'):
              r=subprocess.run(['node','--check',p.as_posix()],text=True,capture_output=True); syntax.append((p.as_posix(),'JS',r.returncode==0,(r.stderr or r.stdout).strip()))
              if r.returncode: add('HIGH','syntax',p,0,'JavaScript syntax check failed')
            elif p.suffix.lower()=='.json':
              try: json.loads((root/p).read_text('utf-8')); syntax.append((p.as_posix(),'JSON',True,''))
              except Exception as e: syntax.append((p.as_posix(),'JSON',False,str(e))); add('HIGH','syntax',p,0,f'Invalid JSON: {e}')
            elif p.suffix.lower()=='.py':
              try: ast.parse((root/p).read_text('utf-8')); syntax.append((p.as_posix(),'Python',True,''))
              except Exception as e: syntax.append((p.as_posix(),'Python',False,str(e))); add('HIGH','syntax',p,0,f'Python syntax error: {e}')
          class H(html.parser.HTMLParser):
            def __init__(self,p): super().__init__(convert_charrefs=True); self.p=p; self.ids=collections.Counter(); self.refs=[]
            def handle_starttag(self,tag,attrs):
              a=dict(attrs); ln=self.getpos()[0]
              if a.get('id'): self.ids[a['id']]+=1
              for k,v in attrs:
                if k.lower().startswith('on') and v: add('MEDIUM','inline-event',self.p,ln,f'Inline handler {k}')
              key='href' if tag in {'a','link'} else 'src'
              if tag in {'a','link','script','img','audio','video','source','iframe'} and a.get(key): self.refs.append((ln,tag,key,a[key]))
              if tag=='a' and a.get('target')=='_blank' and 'noopener' not in (a.get('rel') or ''): add('MEDIUM','reverse-tabnabbing',self.p,ln,'target=_blank without noopener')
          for p in [p for p in paths if p.suffix.lower() in {'.html','.htm'}]:
            t=text(p); h=H(p)
            if t is None: continue
            try: h.feed(t)
            except Exception as e: add('MEDIUM','html-parse',p,0,str(e))
            for i,c in h.ids.items():
              if c>1: add('MEDIUM','duplicate-id',p,0,f'id={i} appears {c} times')
            for ln,tag,key,ref in h.refs:
              if not ref or ref.startswith(('#','mailto:','tel:','javascript:','data:','blob:')): continue
              u=urlsplit(ref)
              if u.scheme in {'http','https'} or ref.startswith('//'):
                if ' ' in ref: add('HIGH','external-reference',p,ln,f'URL contains spaces: {ref}')
                if u.scheme=='http': add('MEDIUM','mixed-content',p,ln,f'HTTP reference: {ref}')
                continue
              target=(root/p.parent/unquote(u.path)).resolve()
              try: target.relative_to(root)
              except ValueError: add('MEDIUM','path-reference',p,ln,f'Reference escapes repo: {ref}'); continue
              if not target.exists(): add('HIGH','broken-reference',p,ln,f'Missing local {tag} {key}: {ref}')
          pats=[('HIGH','dynamic-code',r'\beval\s*\(','eval()'),('HIGH','dynamic-code',r'\bnew\s+Function\s*\(','new Function()'),('MEDIUM','html-sink',r'\.innerHTML\s*=','innerHTML assignment'),('MEDIUM','html-sink',r'insertAdjacentHTML\s*\(','insertAdjacentHTML'),('MEDIUM','html-sink',r'document\.write\s*\(','document.write'),('LOW','storage',r'\blocalStorage\b','localStorage is user-controlled'),('LOW','network',r'\bfetch\s*\(','fetch needs status/schema validation'),('HIGH','command',r'shell\s*=\s*True','shell=True'),('MEDIUM','command',r'\bos\.system\s*\(','os.system'),('HIGH','deserialization',r'\bpickle\.(load|loads)\s*\(','unsafe pickle')]
          secrets=[('private key',r'-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----'),('GitHub token',r'gh[pousr]_[A-Za-z0-9_]{20,}'),('API key',r'AIza[0-9A-Za-z_-]{30,}|\bsk-[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16}')]
          text_ext={'.js','.mjs','.cjs','.ts','.tsx','.jsx','.html','.htm','.css','.json','.py','.php','.rb','.java','.kt','.dart','.go','.rs','.sh','.ps1','.yml','.yaml','.md','.txt','.xml','.toml','.ini','.env'}
          for p in paths:
            if p.suffix.lower() not in text_ext and p.name not in {'.env','.gitignore'}: continue
            t=text(p)
            if t is None: continue
            for n,line in enumerate(t.splitlines(),1):
              for sev,cat,rx,msg in pats:
                if re.search(rx,line): add(sev,cat,p,n,msg)
              for label,rx in secrets:
                if re.search(rx,line): add('CRITICAL','secret',p,n,f'Possible committed {label}; value hidden')
            if p.as_posix().startswith('.github/workflows/'):
              if re.search(r'pull_request_target\s*:',t): add('HIGH','workflow',p,0,'pull_request_target requires trust-boundary review')
              for n,line in enumerate(t.splitlines(),1):
                m=re.search(r'uses:\s*([^\s#]+)@([^\s#]+)',line)
                if m and not re.fullmatch(r'[0-9a-fA-F]{40}',m.group(2)): add('LOW','workflow-pin',p,n,f'{m.group(1)} not pinned to SHA')
          ignored=subprocess.run(['git','ls-files','-ci','--exclude-standard'],text=True,capture_output=True).stdout.splitlines()
          backups=[p.as_posix() for p in paths if re.search(r'(^|/)(backup|archive|old|copy|snapshot)(/|_|-|$)',p.as_posix().lower()) or re.search(r'(backup|bak|old|copy|snapshot)',p.name.lower())]
          tests=[p.as_posix() for p in paths if re.search(r'(^|/)(test|tests|spec|specs)(/|$)',p.as_posix().lower()) or re.search(r'(test|spec)\.',p.name.lower())]
          manifests=[p.as_posix() for p in paths if p.name.lower() in {'package.json','package-lock.json','yarn.lock','pnpm-lock.yaml','requirements.txt','pyproject.toml','poetry.lock','pipfile','composer.json','cargo.toml','go.mod'}]
          workflows=[p.as_posix() for p in paths if p.as_posix().startswith('.github/workflows/')]
          dups=[v for v in hashes.values() if len(v)>1]
          order={'CRITICAL':0,'HIGH':1,'MEDIUM':2,'LOW':3}; findings.sort(key=lambda x:(order.get(x['severity'],9),x['path'],x['line']))
          counts=collections.Counter(x['severity'] for x in findings)
          (out/'AUDIT_FILES.tsv').write_text('path\tbytes\tlines\text\n'+'\n'.join('\t'.join(map(str,r)) for r in sorted(inventory))+'\n','utf-8')
          (out/'AUDIT_FINDINGS.json').write_text(json.dumps(findings,ensure_ascii=False,indent=2),'utf-8')
          md=['# Comprehensive repository audit','',f'- Files: **{len(inventory)}**',f'- Bytes: **{sum(x[1] for x in inventory):,}**',f'- Findings: CRITICAL {counts["CRITICAL"]}, HIGH {counts["HIGH"]}, MEDIUM {counts["MEDIUM"]}, LOW {counts["LOW"]}','', '## Syntax checks','']
          md += [f'- {"PASS" if ok else "FAIL"} `{p}` ({k})'+(f': {d[:250]}' if d else '') for p,k,ok,d in syntax] or ['- None']
          md += ['','## Findings','']+[f'- **{x["severity"]} · {x["category"]}** `{x["path"]}:{x["line"]}` — {x["message"]}' for x in findings] if findings else ['','## Findings','','- None']
          md += ['','## Structure','',f'- Workflows: {workflows or "none"}',f'- Manifests: {manifests or "none"}',f'- Tests: {tests or "none"}',f'- Backup-like paths: {len(backups)}',f'- Tracked but ignored: {ignored or "none"}',f'- Duplicate file groups: {len(dups)}','']
          if backups: md += ['### Backup-like paths','']+[f'- `{x}`' for x in backups[:200]]+['']
          if dups:
            md += ['### Identical-file groups','']
            for g in dups[:100]: md.append('- '+', '.join(f'`{x}`' for x in g))
          md += ['','## Largest files','']+[f'- `{p}` — {s:,} bytes, {l} lines' for p,s,l,e in sorted(inventory,key=lambda x:-x[1])[:40]]
          md += ['','## Limitations','','- Pattern matches require manual validation.','- Static audit does not exercise production networking, visual layout, or every user interaction.','']
          (out/'AUDIT_REPORT.md').write_text('\n'.join(md),'utf-8')
          PY
      - name: Commit reports and remove workflow
        shell: bash
        run: |
          git config user.name repo-audit-bot
          git config user.email repo-audit-bot@users.noreply.github.com
          git add audit/AUDIT_REPORT.md audit/AUDIT_FILES.tsv audit/AUDIT_FINDINGS.json
          git rm .github/workflows/temp-comprehensive-audit.yml
          git commit -m "audit: generate comprehensive static review artifacts"
          git push origin HEAD:audit/comprehensive-review-20260717-v2
