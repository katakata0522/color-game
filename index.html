<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>色の見え方体験ゲーム v5.0</title>
  <meta name="description" content="色の違いを見分けるブラウザゲームです。医療上の検査・診断・判定を行うものではありません。">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" id="game-container">
  
  <div class="header-row">
    <button id="theme-toggle-btn" class="header-icon-btn theme-toggle-btn" aria-label="ダークモードへ切り替える" title="ライト／ダークモード">🌙</button>
    <h1>色の見え方体験ゲーム</h1>
    <button id="sound-toggle-btn" class="header-icon-btn sound-toggle-btn" aria-label="効果音の切り替え" title="効果音 ON/OFF">🔊</button>
  </div>

  <p class="experience-notice" role="note">
    このゲームは色の見え方の違いを簡易的に体験する娯楽コンテンツです。医療上の検査・診断・判定には使用できません。画面設定、周囲の明るさ、体調などでも結果が変わります。
  </p>

  <!-- 強調体験モードON/OFF -->
  <div id="highlight-switcher">
    <span>強調体験モード</span>
    <button id="highlight-btn" aria-pressed="false" title="色の区別が難しい表示を簡易的に体験します">OFF</button>
    <span class="highlight-description">
      <span id="highlight-desc">(ONにすると1～3問目の色が“かなり近い色”に)</span>
    </span>
  </div>

  <!-- 色の見え方を簡易的に模した表示切替 -->
  <div id="cb-mode-switcher" aria-label="簡易表示シミュレーション">
    <button data-type="normal" class="selected">通常</button>
    <button data-type="protanopia">プロタン</button>
    <button data-type="deuteranopia">デュータン</button>
    <button data-type="tritanopia">トリタン</button>
    <span id="cb-tooltip"></span>
  </div>

  <div id="game-info">
    <span>ライフ: <span id="hearts" aria-label="残りライフ"></span></span>
    <span>問目: <span id="question-number">1/15</span></span>
    <span>スコア: <span id="score">0</span></span>
    <span>タイマー: <span id="timer">0.0</span></span>
  </div>

  <div id="game-board" role="grid" aria-label="カラーパネル"></div>
  
  <!-- aria-live="assertive" でスクリーンリーダーに即座に通知 -->
  <p id="result-message" aria-live="assertive"></p>
  <p id="app-status" class="app-status hidden" aria-live="polite"></p>
  
  <div class="controls">
    <button id="start-btn">ゲーム開始</button>
    <button id="reset-btn" class="hidden">リセット</button>
  </div>
  
  <div id="advice-message" class="hidden"></div>

</div>
<script src="script.js"></script>
<script src="theme-safety.js"></script>
</body>
</html>
